name: SonarCloud Analysis

on:
  pull_request:
  push:
    branches:
      - main
      - release-**

concurrency:
  group: "sonarcloud-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: ./.github/actions/ci-setup

      - name: Run unit tests
        run: python3 run_checks.py --utest

      - name: Run coverage
        run: python3 run_checks.py --cov

      - name: Run lint
        run: python3 run_checks.py --lint

      - name: Run pep8 codestyle check
        run: python3 run_checks.py --pep8

      # Secrets are withheld from pull_request runs opened by Dependabot or from forks,
      # so the scan itself can't happen here. Persist the reports + PR metadata as an
      # artifact and let the trusted sonarcloud-pr-scan.yml (workflow_run) do the upload.
      - name: Save PR metadata
        if: github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          jq -n \
            --arg number "$PR_NUMBER" \
            --arg headSha "$PR_HEAD_SHA" \
            --arg headRef "$PR_HEAD_REF" \
            --arg baseRef "$PR_BASE_REF" \
            '{number: $number, headSha: $headSha, headRef: $headRef, baseRef: $baseRef}' \
            > reports/pr.json

      - name: Upload analysis reports
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sonar-reports
          path: reports
          retention-days: 1

      - name: SonarCloud Scan
        if: github.event_name == 'push'
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
